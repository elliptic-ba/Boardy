name: Release

# Build the AppImage and publish it to a GitHub Release whenever a version tag
# is pushed, e.g.:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # installs deps + rebuilds the native SQLite module for Electron (postinstall)
      - run: npm ci

      - run: npm run typecheck

      # bundle + electron-builder → dist/Boardy-<version>.AppImage
      - run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
